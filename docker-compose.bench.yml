# docker-compose.bench.yml — benchmark infrastructure
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.bench.yml up
#
# Adds the naive baseline server alongside the existing gateway + vLLM +
# Redis stack. Benchmark client (run separately, not containerized) hits
# both ports and compares.

services:
  baseline:
    build:
      context: .
      dockerfile: baseline/Dockerfile
    container_name: hf-baseline
    ports:
      - "8100:8100"
    environment:
      - BASELINE_MODEL=Qwen/Qwen2.5-7B-Instruct
      - BASELINE_MAX_NEW_TOKENS=512
      - BASELINE_DTYPE=float16
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
        - video
    security_opt:
        - seccomp=unconfined
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s  # don't fail the container during HF load